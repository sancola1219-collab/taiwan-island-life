<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>我的小世界：台灣島物語</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#3f9fc0;height:100%;}
  canvas{display:block;}
  #intro{position:fixed;inset:0;display:flex;
    background:linear-gradient(180deg,#8fd3e8 0%,#bfe8c8 60%,#f5e9b8 100%);z-index:10;
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
    overflow-y:auto;-webkit-overflow-scrolling:touch;} /* v57 卡片高於螢幕時可上下捲動 */
  #introCard{background:#fffbe9;border:6px solid #b58a4e;border-radius:28px;padding:32px 44px;
    box-shadow:0 12px 40px rgba(0,0,0,.25);text-align:center;max-width:560px;
    margin:auto;} /* v57 margin:auto 取代 flex 置中：內容過高時頂端不會被裁掉 */
  @media (max-height:760px){ /* v57 小螢幕縮版 */
    #introCard{padding:16px 20px;border-width:4px;border-radius:20px;margin:12px auto;}
    #introCard h1{font-size:26px;}
    #introCard .feat{font-size:11px;line-height:1.5;margin-top:6px;}
    #introCard label{margin:7px 0 4px;font-size:13px;}
    #introCard .keys{font-size:10px;line-height:1.5;margin-top:10px;}
    #startBtn{margin-top:12px;font-size:18px;padding:9px 34px;}
    .pk{font-size:13px;padding:5px 9px;min-width:0;}
    #nameIn{font-size:17px;padding:6px 10px;}
    #raceSel{font-size:15px;padding:5px 10px;}
    .sw{width:30px;height:30px;}}
  #introCard h1{margin:0 0 6px;color:#5b4023;font-size:34px;letter-spacing:2px;}
  #introCard .sub{color:#8a6f4d;margin-bottom:18px;font-size:15px;}
  #introCard label{display:block;color:#6b4f2f;font-size:15px;margin:12px 0 6px;font-weight:bold;}
  #nameIn{font-size:20px;padding:8px 14px;border:3px solid #d9b97f;border-radius:12px;outline:none;
    text-align:center;width:220px;background:#fff;color:#5b4023;font-family:inherit;}
  #raceSel{font-size:17px;padding:7px 14px;border:3px solid #d9b97f;border-radius:12px;outline:none;
    text-align:center;width:250px;background:#fff;color:#5b4023;font-family:inherit;}
  .swatches{display:flex;gap:10px;justify-content:center;margin-top:4px;flex-wrap:wrap;}
  .sw{width:36px;height:36px;border-radius:50%;border:4px solid transparent;cursor:pointer;}
  .sw.sel{border-color:#6b4f2f;}
  .pick{display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap;}
  .pk{min-width:44px;padding:7px 12px;border-radius:12px;border:3px solid #d9b97f;background:#fff;
    color:#5b4023;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;}
  .pk.sel{border-color:#e0559b;background:#ffe6f2;}
  #startBtn{margin-top:22px;font-size:22px;font-weight:bold;color:#fff;background:#f0913a;border:none;
    border-radius:16px;padding:12px 46px;cursor:pointer;box-shadow:0 5px 0 #c76f22;font-family:inherit;}
  #startBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #c76f22;}
  #introCard .keys{margin-top:18px;font-size:13px;color:#9a805c;line-height:1.8;}
  #introCard .feat{margin-top:10px;font-size:13px;color:#3f8f5a;line-height:1.7;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="intro">
  <div id="introCard">
    <h1 id="inTitle">我的小世界</h1>
    <div class="sub" id="inSub">～ 台灣島物語・環島大冒險 ～</div>
    <div class="pick" id="langRow" style="margin-bottom:4px;">
      <button class="pk lang sel" data-l="tw">繁體中文</button>
      <button class="pk lang" data-l="cn">简体中文</button>
      <button class="pk lang" data-l="en">English</button>
      <button class="pk lang" data-l="de">Deutsch</button>
      <button class="pk lang" data-l="ja">日本語</button>
    </div>
    <div class="feat" id="inFeat">🏝️ 115+鄉鎮·77景點·10離島　⛵ 買船出海　🚂 火車沿鐵軌環島<br>
      🚡 貓空/日月潭纜車　🎈 熱氣球升空　🎣 深海釣魚　📋 動物任務<br>
      📱 支援手機觸控：搖桿移動·雙指縮放</div>
    <label id="inNameL">你的名字</label>
    <input id="nameIn" maxlength="8" value="小島民">
    <label id="inRaceL">族群（決定你的傳統服飾）</label>
    <select id="raceSel"></select>
    <label id="inColorL">衣服顏色</label>
    <div class="swatches" id="swatches"></div>
    <button id="startBtn">出發前往台灣島！</button>
    <div class="keys" id="inKeys">💻 WASD移動·空白鍵互動·滾輪縮放｜📱 搖桿移動·Ⓐ互動·雙指縮放<br>
      工具 1~5　·　背包 B　·　地圖 M　·　圖鑑 P　·　任務 J　·　說明 H（建議手機橫向遊玩）</div>
  </div>
</div>
<div id="refView" style="display:none;position:fixed;inset:0;z-index:20;background:rgba(20,15,8,.88);
  flex-direction:column;align-items:center;justify-content:center;gap:10px;
  font-family:'Microsoft JhengHei',sans-serif;">
  <div style="display:flex;gap:10px;align-items:center;">
    <select id="refSel" style="font-size:17px;padding:6px 12px;border-radius:10px;border:3px solid #d9b97f;
      background:#fffbe9;color:#5b4023;font-family:inherit;"></select>
    <button id="refClose" style="font-size:17px;font-weight:bold;padding:6px 18px;border-radius:10px;
      border:none;background:#e2574c;color:#fff;cursor:pointer;font-family:inherit;">✕ 關閉</button>
  </div>
  <img id="refImg" style="max-width:94vw;max-height:84vh;border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);border:4px solid #b58a4e;">
</div>
<script src="data.js?v=57"></script>
<script src="game.js?v=57"></script>
</body>
</html>
